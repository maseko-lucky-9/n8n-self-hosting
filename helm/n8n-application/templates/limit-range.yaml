apiVersion: v1
kind: LimitRange
metadata:
  name: {{ include "n8n-application.fullname" . }}-limits
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "n8n-application.labels" . | nindent 4 }}
spec:
  limits:
    # Default limits for containers that don't specify their own
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "2"
        memory: 2Gi
      min:
        cpu: 50m
        memory: 32Mi
