{{- if .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "n8n-application.fullname" . }}-db-backup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "n8n-application.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ include "n8n-application.name" . }}
            app.kubernetes.io/component: backup
        spec:
          serviceAccountName: {{ include "n8n-application.fullname" . }}-postgres-sa
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            fsGroup: 999
            seccompProfile:
              type: RuntimeDefault
          {{- if .Values.backup.offCluster.enabled }}
          # GAP-007: Off-cluster backup enabled.
          # pg-backup runs as an init container to guarantee completion before rclone-upload starts.
          initContainers:
            - name: pg-backup
              image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_NON_ROOT_PASSWORD
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_NON_ROOT_USER
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_DB
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  set -o pipefail
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="/backups/n8n_db_${TIMESTAMP}.sql.gz"

                  echo "[$(date)] Starting backup of database ${POSTGRES_DB}..."
                  pg_dump -h postgres-service -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" \
                    --no-owner --no-acl --clean --if-exists | gzip > "${BACKUP_FILE}"

                  echo "[$(date)] Backup completed: ${BACKUP_FILE} ($(du -h ${BACKUP_FILE} | cut -f1))"

                  # Write filename so rclone-upload container knows what to upload
                  echo "${BACKUP_FILE}" > /backups/.latest-backup

                  # Prune on-cluster backups older than retention period
                  echo "[$(date)] Pruning backups older than {{ .Values.backup.retention }} days..."
                  find /backups -name "n8n_db_*.sql.gz" -mtime +{{ .Values.backup.retention }} -delete
                  echo "[$(date)] Remaining on-cluster backups:"
                  ls -lh /backups/n8n_db_*.sql.gz 2>/dev/null || echo "  (none)"
              resources:
                limits:
                  cpu: 500m
                  memory: 256Mi
                requests:
                  cpu: 100m
                  memory: 128Mi
              volumeMounts:
                - name: backup-volume
                  mountPath: /backups
                - name: tmp
                  mountPath: /tmp
          {{- end }}
          containers:
            {{- if .Values.backup.offCluster.enabled }}
            # GAP-007: rclone uploads the dump file produced by the pg-backup init container
            # to an S3-compatible target (MinIO, Backblaze B2, etc.).
            # Credentials are injected via ExternalSecret from Vault: kv/secret/n8n/live/backup-offcluster
            - name: rclone-upload
              image: "{{ .Values.backup.offCluster.rclone.image.repository }}:{{ .Values.backup.offCluster.rclone.image.tag }}"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              env:
                # rclone remote "offcluster" configured via environment variables — no config file needed
                - name: RCLONE_CONFIG_OFFCLUSTER_TYPE
                  value: "s3"
                - name: RCLONE_CONFIG_OFFCLUSTER_PROVIDER
                  value: "Other"  # Generic S3-compatible; works with MinIO and Backblaze B2
                - name: RCLONE_CONFIG_OFFCLUSTER_ENDPOINT
                  value: {{ .Values.backup.offCluster.endpoint | quote }}
                - name: RCLONE_CONFIG_OFFCLUSTER_ENV_AUTH
                  value: "false"
                - name: RCLONE_CONFIG_OFFCLUSTER_ACL
                  value: "private"
                - name: RCLONE_CONFIG_OFFCLUSTER_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.offCluster.credentialsSecret | quote }}
                      key: RCLONE_S3_ACCESS_KEY_ID
                - name: RCLONE_CONFIG_OFFCLUSTER_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.backup.offCluster.credentialsSecret | quote }}
                      key: RCLONE_S3_SECRET_ACCESS_KEY
                # Point rclone cache to writable /tmp (readOnlyRootFilesystem: true)
                - name: XDG_CACHE_HOME
                  value: "/tmp"
                - name: RCLONE_CACHE_DIR
                  value: "/tmp/rclone-cache"
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  BACKUP_FILE=$(cat /backups/.latest-backup 2>/dev/null || true)
                  if [ -z "${BACKUP_FILE}" ]; then
                    echo "[$(date)] ERROR: /backups/.latest-backup is missing or empty"
                    exit 1
                  fi
                  if [ ! -f "${BACKUP_FILE}" ]; then
                    echo "[$(date)] ERROR: Backup file not found: ${BACKUP_FILE}"
                    exit 1
                  fi
                  echo "[$(date)] Uploading ${BACKUP_FILE} to offcluster:{{ .Values.backup.offCluster.bucket }}/{{ .Values.backup.offCluster.path }}/"
                  rclone --config /dev/null \
                    copy "${BACKUP_FILE}" \
                    "offcluster:{{ .Values.backup.offCluster.bucket }}/{{ .Values.backup.offCluster.path }}/" \
                    --s3-no-check-bucket \
                    --retries 3 \
                    --low-level-retries 3 \
                    --log-level INFO
                  echo "[$(date)] Off-cluster upload complete."
              resources:
                limits:
                  cpu: {{ .Values.backup.offCluster.rclone.resources.limits.cpu }}
                  memory: {{ .Values.backup.offCluster.rclone.resources.limits.memory }}
                requests:
                  cpu: {{ .Values.backup.offCluster.rclone.resources.requests.cpu }}
                  memory: {{ .Values.backup.offCluster.rclone.resources.requests.memory }}
              volumeMounts:
                - name: backup-volume
                  mountPath: /backups
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
            {{- else }}
            # On-cluster only backup (GAP-007 not yet enabled)
            - name: pg-backup
              image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_NON_ROOT_PASSWORD
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_NON_ROOT_USER
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_DB
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  set -o pipefail
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="/backups/n8n_db_${TIMESTAMP}.sql.gz"

                  echo "[$(date)] Starting backup of database ${POSTGRES_DB}..."
                  pg_dump -h postgres-service -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" \
                    --no-owner --no-acl --clean --if-exists | gzip > "${BACKUP_FILE}"

                  echo "[$(date)] Backup completed: ${BACKUP_FILE} ($(du -h ${BACKUP_FILE} | cut -f1))"

                  # Prune backups older than retention period
                  echo "[$(date)] Pruning backups older than {{ .Values.backup.retention }} days..."
                  find /backups -name "n8n_db_*.sql.gz" -mtime +{{ .Values.backup.retention }} -delete
                  echo "[$(date)] Remaining backups:"
                  ls -lh /backups/n8n_db_*.sql.gz 2>/dev/null || echo "  (none)"
              resources:
                limits:
                  cpu: 500m
                  memory: 256Mi
                requests:
                  cpu: 100m
                  memory: 128Mi
              volumeMounts:
                - name: backup-volume
                  mountPath: /backups
                - name: tmp
                  mountPath: /tmp
            {{- end }}
          restartPolicy: OnFailure
          volumes:
            - name: backup-volume
              persistentVolumeClaim:
                claimName: {{ include "n8n-application.fullname" . }}-backup-pvc
            - name: tmp
              emptyDir:
                sizeLimit: 50Mi
---
# PVC for backup storage
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "n8n-application.fullname" . }}-backup-pvc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "n8n-application.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.postgres.persistence.storageClass }}
  storageClassName: {{ .Values.postgres.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.backup.storageSize | default "5Gi" }}
{{- end }}
