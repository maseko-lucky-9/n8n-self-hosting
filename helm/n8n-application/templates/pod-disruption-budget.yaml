{{- if gt (int .Values.replicaCount) 1 }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "n8n-application.fullname" . }}-n8n
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "n8n-application.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      service: n8n
{{- end }}
---
# PDB for PostgreSQL — always enabled since DB availability is critical
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "n8n-application.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "n8n-application.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
