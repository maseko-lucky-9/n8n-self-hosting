apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/component: n8n
  name: n8n
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/component: n8n
  strategy:
    {{- if .Values.queue.enabled }}
    # GAP-012: RollingUpdate safe with queue mode — Redis leader election ensures
    # only one main instance acts as scheduler during the overlap window.
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    {{- else }}
    type: Recreate
    {{- end }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: n8n
    spec:
      serviceAccountName: {{ include "n8n-application.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: volume-permissions
          image: "{{ .Values.initContainers.busybox.repository }}:{{ .Values.initContainers.busybox.tag }}"
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          command: ["sh", "-c", "chown 1000:1000 /data"]
          volumeMounts:
            - name: {{ include "n8n-application.n8nPvcName" . }}
              mountPath: /data
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 32Mi
        # GAP-001: Wait for PostgreSQL to accept connections before starting n8n.
        # Replaces fragile "sleep 5" that caused 19 restarts/7d due to DNS resolution
        # failures (EAI_AGAIN) when CoreDNS wasn't ready after node restart.
        - name: wait-for-postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for PostgreSQL at {{ include "n8n-application.postgresServiceName" . }}:{{ .Values.database.port }}..."
              retries=0
              max_retries=60
              until pg_isready -h {{ include "n8n-application.postgresServiceName" . }} -p {{ .Values.database.port }} -U postgres -q; do
                retries=$((retries + 1))
                if [ $retries -ge $max_retries ]; then
                  echo "ERROR: PostgreSQL not ready after $max_retries attempts (2min)"
                  exit 1
                fi
                echo "Attempt $retries/$max_retries: waiting 2s..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 32Mi
        {{- if .Values.queue.enabled }}
        # Wait for Redis before starting in queue mode
        - name: wait-for-redis
          image: "{{ .Values.initContainers.busybox.repository }}:{{ .Values.initContainers.busybox.tag }}"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -c
            - |
              retries=0; max_retries=30
              until nc -z {{ include "n8n-application.fullname" . }}-redis {{ .Values.queue.redis.port | default 6379 }}; do
                retries=$((retries+1))
                [ $retries -ge $max_retries ] && echo "ERROR: Redis not ready" && exit 1
                echo "Attempt $retries/$max_retries: waiting 2s..."; sleep 2
              done
              echo "Redis is ready!"
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 32Mi
        {{- end }}
      containers:
        - name: n8n
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["n8n"]
          args: ["start"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_HOST
              value: {{ include "n8n-application.postgresServiceName" . }}
            - name: DB_POSTGRESDB_PORT
              value: {{ .Values.database.port | quote }}
            - name: DB_POSTGRESDB_DATABASE
              value: {{ .Values.database.database | default "n8n" }}
            - name: DB_POSTGRESDB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "n8n-application.postgresSecretName" . }}
                  key: POSTGRES_NON_ROOT_USER
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "n8n-application.postgresSecretName" . }}
                  key: POSTGRES_NON_ROOT_PASSWORD
            {{- if .Values.database.ssl }}
            - name: DB_POSTGRESDB_SSL_ENABLED
              value: "true"
            {{- end }}
            - name: N8N_PROTOCOL
              value: {{ .Values.n8n.protocol | default "http" }}
            - name: N8N_PORT
              value: "{{ .Values.n8n.port | default 5678 }}"
            # Execution pruning — prevents unbounded data growth and OOM
            - name: EXECUTIONS_DATA_PRUNE
              value: "true"
            - name: EXECUTIONS_DATA_MAX_AGE
              value: {{ .Values.n8n.executionDataMaxAge | default "168" | quote }}
            - name: EXECUTIONS_DATA_PRUNE_MAX_COUNT
              value: {{ .Values.n8n.executionDataPruneMaxCount | default "50000" | quote }}
            # Structured JSON logging for production observability
            - name: N8N_LOG_LEVEL
              value: {{ .Values.n8n.logLevel | default "info" | quote }}
            - name: N8N_LOG_OUTPUT
              value: {{ .Values.n8n.logOutput | default "console" | quote }}
            # Diagnostics and telemetry
            - name: N8N_DIAGNOSTICS_ENABLED
              value: "false"
            # GAP-002: Encryption key for workflow credential secrets at rest.
            # Must match the key that encrypted existing credentials — never regenerate.
            {{- if and .Values.externalSecrets.enabled .Values.externalSecrets.vault.appSecretPath }}
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "n8n-application.appSecretName" . }}
                  key: N8N_ENCRYPTION_KEY
            {{- else if .Values.n8n.encryptionKey }}
            - name: N8N_ENCRYPTION_KEY
              value: {{ .Values.n8n.encryptionKey | quote }}
            {{- end }}
            # GAP-004: Webhook callback URL for external triggers
            {{- if and .Values.externalSecrets.enabled .Values.externalSecrets.vault.appSecretPath }}
            - name: N8N_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "n8n-application.appSecretName" . }}
                  key: N8N_WEBHOOK_URL
            {{- else if .Values.n8n.webhookUrl }}
            - name: N8N_WEBHOOK_URL
              value: {{ .Values.n8n.webhookUrl | quote }}
            {{- end }}
            {{- if .Values.queue.enabled }}
            # GAP-012: Queue mode — main handles webhooks/scheduling, workers execute jobs
            - name: EXECUTIONS_MODE
              value: queue
            - name: QUEUE_BULL_REDIS_HOST
              value: {{ include "n8n-application.fullname" . }}-redis
            - name: QUEUE_BULL_REDIS_PORT
              value: {{ .Values.queue.redis.port | default 6379 | quote }}
            # Ensure graceful shutdown doesn't drop in-flight webhook registrations
            - name: N8N_SKIP_WEBHOOK_DEREGISTRATION_SHUTDOWN
              value: "true"
            {{- end }}
            {{- if .Values.extraEnv }}
            {{- toYaml .Values.extraEnv | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.n8n.port | default 5678 }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # Health checks — enables K8s self-healing
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.n8n.port | default 5678 }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.n8n.port | default 5678 }}
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.n8n.port | default 5678 }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 12
          volumeMounts:
            - mountPath: /home/node/.n8n
              name: {{ include "n8n-application.n8nPvcName" . }}
            {{- if .Values.securityContext.readOnlyRootFilesystem }}
            - mountPath: /tmp
              name: tmp-volume
            - mountPath: /home/node/.cache
              name: cache-volume
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{ toYaml . | nindent 12 }}
            {{- end }}
      restartPolicy: Always
      volumes:
        - name: {{ include "n8n-application.n8nPvcName" . }}
          persistentVolumeClaim:
            claimName: {{ include "n8n-application.n8nPvcName" . }}
        {{- if .Values.securityContext.readOnlyRootFilesystem }}
        - name: tmp-volume
          emptyDir:
            sizeLimit: 100Mi
        - name: cache-volume
          emptyDir:
            sizeLimit: 100Mi
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{ toYaml . | nindent 8 }}
        {{- end }}
