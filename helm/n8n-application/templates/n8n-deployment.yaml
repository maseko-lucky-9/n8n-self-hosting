apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    service: n8n
  name: n8n
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      service: n8n
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        service: n8n
    spec:
      serviceAccountName: {{ include "n8n-application.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      initContainers:
        - name: volume-permissions
          image: busybox:1.36
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          command: ["sh", "-c", "chown 1000:1000 /data"]
          volumeMounts:
            - name: n8n-claim0
              mountPath: /data
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: n8n
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - /bin/sh
          args:
            - -c
            - sleep 5; n8n start
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_HOST
              value: postgres-service
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: {{ .Values.database.database | default "n8n" }}
            - name: DB_POSTGRESDB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_NON_ROOT_USER
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_NON_ROOT_PASSWORD
            {{- if .Values.database.ssl }}
            - name: DB_POSTGRESDB_SSL_ENABLED
              value: "true"
            {{- end }}
            - name: N8N_PROTOCOL
              value: {{ .Values.n8n.protocol | default "http" }}
            - name: N8N_PORT
              value: "{{ .Values.n8n.port | default 5678 }}"
            # Execution pruning — prevents unbounded data growth and OOM
            - name: EXECUTIONS_DATA_PRUNE
              value: "true"
            - name: EXECUTIONS_DATA_MAX_AGE
              value: {{ .Values.n8n.executionDataMaxAge | default "168" | quote }}
            - name: EXECUTIONS_DATA_PRUNE_MAX_COUNT
              value: {{ .Values.n8n.executionDataPruneMaxCount | default "50000" | quote }}
            # Structured JSON logging for production observability
            - name: N8N_LOG_LEVEL
              value: {{ .Values.n8n.logLevel | default "info" | quote }}
            - name: N8N_LOG_OUTPUT
              value: {{ .Values.n8n.logOutput | default "console" | quote }}
            # Diagnostics and telemetry
            - name: N8N_DIAGNOSTICS_ENABLED
              value: "false"
            {{- if .Values.extraEnv }}
            {{- toYaml .Values.extraEnv | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.n8n.port | default 5678 }}
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          # Health checks — enables K8s self-healing
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.n8n.port | default 5678 }}
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.n8n.port | default 5678 }}
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.n8n.port | default 5678 }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 12
          volumeMounts:
            - mountPath: /home/node/.n8n
              name: n8n-claim0
            {{- if .Values.securityContext.readOnlyRootFilesystem }}
            - mountPath: /tmp
              name: tmp-volume
            - mountPath: /home/node/.cache
              name: cache-volume
            {{- end }}
      restartPolicy: Always
      volumes:
        - name: n8n-claim0
          persistentVolumeClaim:
            claimName: n8n-claim0
        {{- if .Values.securityContext.readOnlyRootFilesystem }}
        - name: tmp-volume
          emptyDir:
            sizeLimit: 100Mi
        - name: cache-volume
          emptyDir:
            sizeLimit: 100Mi
        {{- end }}
