{{- if .Values.queue.enabled }}
# GAP-012: n8n worker — executes workflow jobs from the Redis queue.
# Workers are stateless: no PVC, no HTTP ingress. Horizontally scalable.
# Health check uses QUEUE_HEALTH_CHECK_ACTIVE to expose /healthz on port 5679.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "n8n-application.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "n8n-application.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.queue.worker.replicas | default 1 }}
  selector:
    matchLabels:
      service: n8n-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        service: n8n-worker
        app.kubernetes.io/name: {{ include "n8n-application.name" . | quote }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: {{ include "n8n-application.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 120
      initContainers:
        # Wait for PostgreSQL before starting
        - name: wait-for-postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -c
            - |
              retries=0; max_retries=60
              until pg_isready -h postgres-service -p {{ .Values.database.port }} -U postgres -q; do
                retries=$((retries+1))
                [ $retries -ge $max_retries ] && echo "ERROR: PostgreSQL not ready" && exit 1
                echo "Attempt $retries/$max_retries: waiting 2s..."; sleep 2
              done
              echo "PostgreSQL is ready!"
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 32Mi
        # Wait for Redis before starting
        - name: wait-for-redis
          image: busybox:1.36
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command:
            - /bin/sh
            - -c
            - |
              retries=0; max_retries=30
              until nc -z {{ include "n8n-application.fullname" . }}-redis {{ .Values.queue.redis.port | default 6379 }}; do
                retries=$((retries+1))
                [ $retries -ge $max_retries ] && echo "ERROR: Redis not ready" && exit 1
                echo "Attempt $retries/$max_retries: waiting 2s..."; sleep 2
              done
              echo "Redis is ready!"
          resources:
            limits:
              cpu: 100m
              memory: 64Mi
            requests:
              cpu: 50m
              memory: 32Mi
      containers:
        - name: n8n-worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["n8n"]
          args: ["worker"]
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_HOST
              value: postgres-service
            - name: DB_POSTGRESDB_PORT
              value: {{ .Values.database.port | quote }}
            - name: DB_POSTGRESDB_DATABASE
              value: {{ .Values.database.database | default "n8n" }}
            - name: DB_POSTGRESDB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_NON_ROOT_USER
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_NON_ROOT_PASSWORD
            - name: EXECUTIONS_MODE
              value: queue
            - name: QUEUE_BULL_REDIS_HOST
              value: {{ include "n8n-application.fullname" . }}-redis
            - name: QUEUE_BULL_REDIS_PORT
              value: {{ .Values.queue.redis.port | default 6379 | quote }}
            # Health check endpoint on workers (port 5679 avoids collision with main on same node)
            - name: QUEUE_HEALTH_CHECK_ACTIVE
              value: "true"
            - name: QUEUE_HEALTH_CHECK_PORT
              value: {{ .Values.queue.worker.healthPort | default 5679 | quote }}
            - name: N8N_LOG_LEVEL
              value: {{ .Values.n8n.logLevel | default "info" | quote }}
            - name: N8N_LOG_OUTPUT
              value: {{ .Values.n8n.logOutput | default "console" | quote }}
            - name: N8N_DIAGNOSTICS_ENABLED
              value: "false"
            {{- if and .Values.externalSecrets.enabled .Values.externalSecrets.vault.appSecretPath }}
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: n8n-app-secret
                  key: N8N_ENCRYPTION_KEY
            {{- else if .Values.n8n.encryptionKey }}
            - name: N8N_ENCRYPTION_KEY
              value: {{ .Values.n8n.encryptionKey | quote }}
            {{- end }}
            {{- if .Values.extraEnv }}
            {{- toYaml .Values.extraEnv | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.queue.worker.healthPort | default 5679 }}
              name: health
              protocol: TCP
          resources:
            {{- toYaml .Values.queue.worker.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 12
          volumeMounts:
            # n8n writes a config file on startup even in worker mode; emptyDir satisfies
            # the write without persistent storage (workers are stateless)
            - mountPath: /home/node/.n8n
              name: n8n-config
            {{- if .Values.securityContext.readOnlyRootFilesystem }}
            - mountPath: /tmp
              name: tmp-volume
            - mountPath: /home/node/.cache
              name: cache-volume
            {{- end }}
      volumes:
        - name: n8n-config
          emptyDir:
            sizeLimit: 10Mi
        {{- if .Values.securityContext.readOnlyRootFilesystem }}
        - name: tmp-volume
          emptyDir:
            sizeLimit: 100Mi
        - name: cache-volume
          emptyDir:
            sizeLimit: 100Mi
        {{- end }}
{{- end }}
