# GAP-015: Postgres runs as a StatefulSet for stable identity, ordered lifecycle,
# and correct Kubernetes workload classification for a stateful database.
#
# PVC note: The data volume is referenced via `volumes` (not volumeClaimTemplates)
# to avoid a data migration of the existing postgres-pvc. For a single-replica
# homelab this is functionally equivalent. Future work: adopt the PVC into
# volumeClaimTemplates once a proper migration window is available.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app.kubernetes.io/name: {{ include "n8n-application.name" . | quote }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgres
  name: {{ include "n8n-application.fullname" . }}-postgres
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  serviceName: postgres-headless
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "n8n-application.name" . | quote }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "n8n-application.name" . | quote }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: postgres
    spec:
      serviceAccountName: {{ include "n8n-application.fullname" . }}-postgres-sa
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy | default "IfNotPresent" }}
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          ports:
            - containerPort: 5432
              protocol: TCP
          volumeMounts:
            - name: postgresql-pv
              mountPath: /var/lib/postgresql/data
            - name: init-data
              mountPath: /docker-entrypoint-initdb.d/init-n8n-user.sh
              subPath: init-data.sh
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_NON_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_NON_ROOT_USER
            - name: POSTGRES_NON_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_NON_ROOT_PASSWORD
            - name: POSTGRES_HOST
              value: {{ include "n8n-application.fullname" . }}-postgres-service
            - name: POSTGRES_PORT
              value: "5432"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - pg_isready -U postgres
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
        {{- if and .Values.postgres.metrics .Values.postgres.metrics.enabled }}
        # GAP-006: Postgres metrics exporter for Prometheus
        - name: postgres-exporter
          image: "{{ .Values.postgres.metrics.image.repository }}:{{ .Values.postgres.metrics.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.metrics.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - containerPort: 9187
              name: pg-metrics
              protocol: TCP
          env:
            - name: DATA_SOURCE_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DATA_SOURCE_URI
              value: "localhost:5432/{{ .Values.database.database | default "n8n" }}?sslmode=disable"
          resources:
            {{- toYaml .Values.postgres.metrics.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /metrics
              port: pg-metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /metrics
              port: pg-metrics
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
        {{- end }}
      volumes:
        - name: postgresql-pv
          persistentVolumeClaim:
            claimName: {{ include "n8n-application.fullname" . }}-postgres-pvc
        - name: init-data
          configMap:
            name: init-data
            defaultMode: 0744
