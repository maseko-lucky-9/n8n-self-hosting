apiVersion: v1
kind: Service
metadata:
  labels:
    # GAP-014: Cleaned up from "postgres-n8n-svn" for consistency
    service: postgres
  name: postgres-service
  namespace: {{ .Release.Namespace }}
spec:
  type: ClusterIP
  ports:
    - name: "5432"
      port: 5432
      targetPort: 5432
      protocol: TCP
    {{- if and .Values.postgres.metrics .Values.postgres.metrics.enabled }}
    - name: "9187"
      port: 9187
      targetPort: 9187
      protocol: TCP
    {{- end }}
  selector:
    app.kubernetes.io/name: {{ include "n8n-application.name" . | quote }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: postgres
