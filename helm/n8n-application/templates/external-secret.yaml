{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-external-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "n8n-application.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: vault-backend
    kind: SecretStore

  # The Kubernetes Secret that ESO will create/manage
  target:
    name: {{ include "n8n-application.postgresSecretName" . }}
    creationPolicy: Owner
    deletionPolicy: Retain

  # Map Vault KV keys → Kubernetes Secret keys
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: {{ .Values.externalSecrets.vault.secretPath | quote }}
        property: POSTGRES_USER

    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.vault.secretPath | quote }}
        property: POSTGRES_PASSWORD

    - secretKey: POSTGRES_DB
      remoteRef:
        key: {{ .Values.externalSecrets.vault.secretPath | quote }}
        property: POSTGRES_DB

    - secretKey: POSTGRES_NON_ROOT_USER
      remoteRef:
        key: {{ .Values.externalSecrets.vault.secretPath | quote }}
        property: POSTGRES_NON_ROOT_USER

    - secretKey: POSTGRES_NON_ROOT_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.vault.secretPath | quote }}
        property: POSTGRES_NON_ROOT_PASSWORD
{{- end }}
{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.vault.appSecretPath }}
---
# GAP-002/005: App-level secrets (encryption key, webhook URL) from Vault.
# Vault path: kv/<appSecretPath> (e.g., kv/secret/n8n/live/app)
# Prerequisite: secrets must exist in Vault before ESO can sync.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "n8n-application.appSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "n8n-application.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: vault-backend
    kind: SecretStore

  target:
    name: {{ include "n8n-application.appSecretName" . }}
    creationPolicy: Owner
    deletionPolicy: Retain

  data:
    - secretKey: N8N_ENCRYPTION_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.vault.appSecretPath | quote }}
        property: N8N_ENCRYPTION_KEY

    - secretKey: N8N_WEBHOOK_URL
      remoteRef:
        key: {{ .Values.externalSecrets.vault.appSecretPath | quote }}
        property: N8N_WEBHOOK_URL
{{- end }}
{{- if and .Values.externalSecrets.enabled .Values.backup.offCluster.enabled }}
---
# GAP-007: Off-cluster backup credentials from Vault.
# Vault path: kv/secret/n8n/live/backup-offcluster
# Required keys: RCLONE_S3_ACCESS_KEY_ID, RCLONE_S3_SECRET_ACCESS_KEY
# Prereq: vault kv put kv/secret/n8n/live/backup-offcluster \
#           RCLONE_S3_ACCESS_KEY_ID=<key> RCLONE_S3_SECRET_ACCESS_KEY=<secret>
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-backup-offcluster-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "n8n-application.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: {{ .Values.backup.offCluster.credentialsSecret | quote }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: RCLONE_S3_ACCESS_KEY_ID
      remoteRef:
        key: {{ .Values.externalSecrets.vault.backupSecretPath | quote }}
        property: RCLONE_S3_ACCESS_KEY_ID
    - secretKey: RCLONE_S3_SECRET_ACCESS_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.vault.backupSecretPath | quote }}
        property: RCLONE_S3_SECRET_ACCESS_KEY
{{- end }}
