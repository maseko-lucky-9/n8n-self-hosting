apiVersion: v1
kind: ResourceQuota
metadata:
  name: {{ include "n8n-application.fullname" . }}-quota
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "n8n-application.labels" . | nindent 4 }}
spec:
  hard:
    # Cap total namespace resource consumption — tunable per environment via values.resourceQuota
    requests.cpu: {{ .Values.resourceQuota.requests.cpu | quote }}
    requests.memory: {{ .Values.resourceQuota.requests.memory }}
    limits.cpu: {{ .Values.resourceQuota.limits.cpu | quote }}
    limits.memory: {{ .Values.resourceQuota.limits.memory }}
    pods: {{ .Values.resourceQuota.pods | quote }}
    persistentvolumeclaims: {{ .Values.resourceQuota.pvcs | quote }}
