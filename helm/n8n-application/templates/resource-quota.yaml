apiVersion: v1
kind: ResourceQuota
metadata:
  name: {{ include "n8n-application.fullname" . }}-quota
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "n8n-application.labels" . | nindent 4 }}
spec:
  hard:
    # Cap total namespace resource consumption
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    pods: "10"
    persistentvolumeclaims: "5"
