# Live Environment Configuration for n8n
# Runtime: Ubuntu home server, MicroK8s (single-node)
# Purpose: Production deployment

replicaCount: 1  # LIVE: Single-node cluster, no HA

namespace: n8n-live

image:
  repository: n8nio/n8n
  pullPolicy: IfNotPresent
  tag: "1.19.4@sha256:df2b8fd4a451294229ef6678d780b6c3fcf935c737c8f3f35bddef16cfa16b33"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "n8n-application"  # Ensures consistent resource names regardless of Helm release name

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

# LIVE: Strict security context
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true  # LIVE: Read-only root filesystem
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  port: 80

# GAP-003: Ingress disabled — managed by homelab-infra/ingress/manifests/n8n-ingress.yaml
# The homelab-infra ingress provides TLS (homelab-tls wildcard) + nginx basic auth.
# Having two Ingress resources for the same host caused ambiguous routing.
ingress:
  enabled: false

# GAP-017: Right-sized based on 7-day baseline (actual: 9m CPU / 142Mi RAM).
# Requests give 5x CPU headroom and 1.8x RAM headroom over observed idle.
# Memory limit kept at 1Gi to cover NODE_OPTIONS --max-old-space-size=768 + overhead.
resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 50m
    memory: 256Mi

# LIVE: Node.js memory tuning + Prometheus metrics
extraEnv:
  - name: NODE_OPTIONS
    value: "--max-old-space-size=768"
  - name: N8N_METRICS
    value: "true"

autoscaling:
  enabled: false  # LIVE: Single-node, no autoscaling

nodeSelector: {}
tolerations: []
affinity: {}

# n8n specific configuration
n8n:
  host: "0.0.0.0"
  port: 5678
  # GAP-011: TLS terminates at nginx ingress (homelab-infra), n8n receives plain HTTP
  protocol: "http"
  # Execution pruning — prevents unbounded data growth
  executionDataMaxAge: "168"       # 7 days (in hours)
  executionDataPruneMaxCount: "50000"
  # Structured JSON logging for observability
  logLevel: "info"
  logOutput: "console,file"
  # GAP-004: External webhook callback URL (must match ingress hostname)
  webhookUrl: "https://n8n.homelab.local"

# PostgreSQL configuration
postgres:
  image:
    repository: postgres
    tag: "16-alpine@sha256:60b180625695e90b6e450405d5f0bcb74bc8c52c65d1cd11aeb3da46cac06dd8"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 250m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi
  persistence:
    storageClass: "microk8s-hostpath"  # LIVE: MicroK8s storage
    size: 20Gi
  # GAP-006: Postgres metrics exporter sidecar for Prometheus
  metrics:
    enabled: true
    image:
      repository: prometheuscommunity/postgres-exporter
      tag: "v0.15.0@sha256:31bdf410910646a05c7edde8d95ab771c9d78fbfbc26b50a52548707496c284d"
      pullPolicy: IfNotPresent
    resources:
      limits:
        cpu: 100m
        memory: 64Mi
      requests:
        cpu: 50m  # LimitRange floor: min.cpu=50m
        memory: 32Mi

# Database connection
# LIVE: Passwords should be managed by Vault/ESO — do NOT put real passwords here
database:
  type: "postgresdb"
  host: "postgres-service"
  port: 5432
  database: "n8n"
  username: "n8n_live"
  password: "POSTGRES_PASSWORD"  # LIVE: Replace via ESO or --set override
  ssl: false  # In-cluster connection via ClusterIP — SSL not needed (postgres:16-alpine has no SSL by default)

# N8N data persistence
persistence:
  enabled: true
  storageClass: "microk8s-hostpath"  # LIVE: MicroK8s storage
  accessMode: ReadWriteOnce
  size: 5Gi

# LIVE: Network isolation enabled
networkPolicy:
  enabled: true
  allowedNamespaces:
    - ingress        # MicroK8s ingress controller namespace
    - observability  # Prometheus scraping

# External Secrets Configuration
externalSecrets:
  enabled: true  # LIVE: Use Vault via ESO
  refreshInterval: "1h"  # How often ESO re-syncs from Vault
  vault:
    # In-cluster Vault server -- HTTPS required (Vault TLS listener)
    address: "https://vault.vault.svc.cluster.local:8200"
    kvPath: "kv"              # KV v2 mount point only (not the full secret path)
    kvVersion: "v2"
    # Full path within the KV engine where postgres creds are stored
    # Must include 'secret/' prefix to match Vault policy: kv/data/secret/n8n/+/*
    secretPath: "secret/n8n/live/postgres"
    # GAP-002/005: App-level secrets (encryption key, webhook URL)
    # Vault path: kv/<appSecretPath> → kv/secret/n8n/live/app
    appSecretPath: "secret/n8n/live/app"
    # GAP-007: Off-cluster backup credentials
    backupSecretPath: "secret/n8n/live/backup-offcluster"
    # CA certificate for Vault TLS verification
    # Prereq: 'vault-tls-ca' Secret with key 'ca.crt' must exist in the namespace
    caProvider:
      type: Secret
      name: vault-tls-ca
      key: ca.crt
      namespace: n8n-live
    auth:
      mountPath: "kubernetes"             # Vault Kubernetes auth mount
      role: "n8n-readonly"                # Vault role with read-only policy on kv/data/secret/n8n/+/*
      serviceAccount: "external-secrets-n8n"  # Dedicated SA for ESO Vault auth

# LIVE: Automated backups
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention: 30  # days
  storageSize: 10Gi
  # GAP-007: Off-cluster backup via rclone to S3-compatible target.
  # Prerequisites before enabling:
  #   1. Populate Vault: vault kv put kv/secret/n8n/live/backup-offcluster \
  #        RCLONE_S3_ACCESS_KEY_ID=<key> RCLONE_S3_SECRET_ACCESS_KEY=<secret>
  #   2. Set endpoint, bucket, path below
  #   3. Set enabled: true and helm upgrade
  offCluster:
    enabled: false
    endpoint: ""      # e.g. "https://s3.us-west-002.backblazeb2.com" or "http://minio.homelab.local:9000"
    bucket: ""        # e.g. "homelab-n8n-backups"
    path: "n8n"       # path prefix within bucket
    credentialsSecret: "n8n-backup-offcluster-secret"  # created by ESO (see external-secret.yaml)
    rclone:
      image:
        repository: rclone/rclone
        tag: "1.68@sha256:41388051445353047e007aa8978ebe224a1efdd6edc55fb746656d19ddf59de2"
      resources:
        limits:
          cpu: 200m
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi

# GAP-012: Queue mode — main + worker architecture with dedicated Redis.
# Enables RollingUpdate strategy on main and horizontal worker scaling.
queue:
  enabled: true
  redis:
    image: "redis:7-alpine@sha256:4bfd9eca23339865dc14fe75f6d9ae643f714924623978dd2798f1a673b08f43"
    port: 6379
  redisResources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 50m  # LimitRange floor
      memory: 64Mi
  worker:
    replicas: 1
    healthPort: 5679
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 50m  # LimitRange floor
        memory: 256Mi

# Init container images
initContainers:
  busybox:
    repository: busybox
    tag: "1.36@sha256:b7f3d86d6e84fc17718c48bcde1450807faa2d56704205c697b4bd5df7b9e29f"

# Namespace ResourceQuota — right-sized for live single-node cluster
resourceQuota:
  requests:
    cpu: "2"
    memory: 4Gi
  limits:
    cpu: "4"
    memory: 8Gi
  pods: "20"
  pvcs: "10"

# LIVE: Monitoring & Alerting
monitoring:
  enabled: true
  scrapeInterval: "30s"
  scrapeTimeout: "10s"
  additionalLabels:
    release: kube-prom-stack  # Match Prometheus Operator serviceMonitorSelector
  grafanaDashboard:
    enabled: true
    namespace: ""  # Defaults to release namespace; set to "monitoring" if Grafana is there
