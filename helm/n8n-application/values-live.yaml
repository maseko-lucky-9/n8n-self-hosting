# Live Environment Configuration for n8n
# Runtime: Ubuntu home server, MicroK8s (single-node)
# Purpose: Production deployment

replicaCount: 1  # LIVE: Single-node cluster, no HA

namespace: n8n-live

image:
  repository: n8nio/n8n
  pullPolicy: IfNotPresent
  tag: "1.19.4"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: "n8n-application"  # Ensures consistent resource names regardless of Helm release name

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

# LIVE: Strict security context
podSecurityContext:
  fsGroup: 1000
  runAsNonRoot: true
  runAsUser: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true  # LIVE: Read-only root filesystem
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
    - ALL

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "public"  # LIVE: MicroK8s ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    # [ACTION REQUIRED] Uncomment when cert-manager + real domain is configured:
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "10"  # LIVE: Rate limiting (10 req/sec)
  hosts:
    - host: n8n.local  # [ACTION REQUIRED] Replace with your actual domain
      paths:
        - path: /
          pathType: Prefix
  # [ACTION REQUIRED] Uncomment when cert-manager + real domain is configured:
  # tls:
  #   - secretName: n8n-live-tls
  #     hosts:
  #       - n8n.local
  tls: []

# LIVE: Production-grade resources for homelab
resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

# LIVE: Node.js memory tuning
extraEnv:
  - name: NODE_OPTIONS
    value: "--max-old-space-size=768"

autoscaling:
  enabled: false  # LIVE: Single-node, no autoscaling

nodeSelector: {}
tolerations: []
affinity: {}

# n8n specific configuration
n8n:
  host: "0.0.0.0"
  port: 5678
  protocol: "https"  # LIVE: HTTPS in production
  # Execution pruning — prevents unbounded data growth
  executionDataMaxAge: "168"       # 7 days (in hours)
  executionDataPruneMaxCount: "50000"
  # Structured JSON logging for observability
  logLevel: "info"
  logOutput: "console,file"

# PostgreSQL configuration
postgres:
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  persistence:
    storageClass: "microk8s-hostpath"  # LIVE: MicroK8s storage
    size: 20Gi

# Database connection
# LIVE: Passwords should be managed by Vault/ESO — do NOT put real passwords here
database:
  type: "postgresdb"
  host: "postgres-service"
  port: 5432
  database: "n8n"
  username: "n8n_live"
  password: "POSTGRES_PASSWORD"  # LIVE: Replace via ESO or --set override
  ssl: false  # In-cluster connection via ClusterIP — SSL not needed (postgres:16-alpine has no SSL by default)

# N8N data persistence
persistence:
  enabled: true
  storageClass: "microk8s-hostpath"  # LIVE: MicroK8s storage
  accessMode: ReadWriteOnce
  size: 5Gi

# LIVE: Network isolation enabled
networkPolicy:
  enabled: true
  allowedNamespaces:
    - ingress  # MicroK8s ingress controller namespace

# External Secrets Configuration
externalSecrets:
  enabled: true  # LIVE: Use Vault via ESO
  refreshInterval: "1h"  # How often ESO re-syncs from Vault
  vault:
    # In-cluster Vault server (adjust namespace if Vault is elsewhere)
    address: "http://vault.vault.svc.cluster.local:8200"
    kvPath: "secret/n8n/live/postgres"          # Vault KV v2 mount path
    kvVersion: "v2"
    # Path within the KV engine where postgres creds are stored
    secretPath: "n8n/live/postgres"
    auth:
      mountPath: "kubernetes"   # Vault Kubernetes auth mount
      role: "n8n-live"          # Vault role bound to the SA
      serviceAccount: ""        # Defaults to the Helm release SA

# LIVE: Automated backups
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM
  retention: 30  # days
  storageSize: 10Gi

# LIVE: Monitoring & Alerting
monitoring:
  enabled: true
  scrapeInterval: "30s"
  scrapeTimeout: "10s"
  additionalLabels:
    release: prometheus  # Match your Prometheus Operator selector
  grafanaDashboard:
    enabled: true
    namespace: ""  # Defaults to release namespace; set to "monitoring" if Grafana is there
