apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: reelsmith-tiktok
  namespace: n8n-live
  labels:
    app.kubernetes.io/part-of: reelsmith-social-publish
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: reelsmith-tiktok
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: client_key
      remoteRef:
        key: "secret/n8n/live/reelsmith-tiktok"
        property: client_key
    - secretKey: client_secret
      remoteRef:
        key: "secret/n8n/live/reelsmith-tiktok"
        property: client_secret
