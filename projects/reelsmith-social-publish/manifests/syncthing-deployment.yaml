---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncthing
  namespace: n8n-live
  labels:
    app.kubernetes.io/name: syncthing
    app.kubernetes.io/part-of: reelsmith-social-publish
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: syncthing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: syncthing
        app.kubernetes.io/part-of: reelsmith-social-publish
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
      containers:
        - name: syncthing
          image: syncthing/syncthing:1.27
          imagePullPolicy: IfNotPresent
          env:
            - name: STNOUPGRADE
              value: "true"
          ports:
            - name: web
              containerPort: 8384
              protocol: TCP
            - name: sync-tcp
              containerPort: 22000
              protocol: TCP
            - name: sync-udp
              containerPort: 22000
              protocol: UDP
          volumeMounts:
            - name: data
              mountPath: /var/syncthing
          readinessProbe:
            httpGet:
              path: /rest/noauth/health
              port: 8384
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /rest/noauth/health
              port: 8384
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: syncthing-reelsmith-pvc
---
# ClusterIP for in-cluster web UI access (port-forward or internal ingress)
apiVersion: v1
kind: Service
metadata:
  name: syncthing
  namespace: n8n-live
  labels:
    app.kubernetes.io/name: syncthing
    app.kubernetes.io/part-of: reelsmith-social-publish
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: syncthing
  ports:
    - name: web
      port: 8384
      targetPort: 8384
      protocol: TCP
---
# NodePort so the Mac can reach Syncthing for folder pairing.
# Connect from Mac: <homelab-node-ip>:32200
apiVersion: v1
kind: Service
metadata:
  name: syncthing-sync
  namespace: n8n-live
  labels:
    app.kubernetes.io/name: syncthing
    app.kubernetes.io/part-of: reelsmith-social-publish
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: syncthing
  ports:
    - name: sync-tcp
      port: 22000
      targetPort: 22000
      nodePort: 32200
      protocol: TCP
