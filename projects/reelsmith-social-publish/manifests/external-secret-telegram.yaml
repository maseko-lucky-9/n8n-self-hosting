apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: reelsmith-telegram
  namespace: n8n-live
  labels:
    app.kubernetes.io/part-of: reelsmith-social-publish
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: reelsmith-telegram
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: bot_token
      remoteRef:
        key: "secret/n8n/live/reelsmith-telegram"
        property: bot_token
    - secretKey: chat_id
      remoteRef:
        key: "secret/n8n/live/reelsmith-telegram"
        property: chat_id
